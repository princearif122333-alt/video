<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhaleDrop - Super Admin Panel</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --bg-dark: #070A15;      
            --bg-card: #151B2B;      
            --purple-btn: #7C3AED;
            --text-main: #FFFFFF;
            --text-muted: #8E9BAE;
            --success: #10B981;
            --danger: #EF4444;
            --star-gold: #FBBF24;
            --border-color: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); padding: 20px; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 15px; border-bottom: 1px solid var(--border-color); }
        .header h1 { font-size: 24px; color: #FFF; display: flex; align-items: center; gap: 10px; }
        .header h1 i { color: #0EA5E9; filter: drop-shadow(0 0 10px rgba(14,165,233,0.5));}

        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; align-items: start; }
        @media (max-width: 768px) { .container { grid-template-columns: 1fr; } }

        .card { background: var(--bg-card); border-radius: 16px; padding: 24px; border: 1px solid var(--border-color); box-shadow: 0 8px 24px rgba(0,0,0,0.2); }
        .card-title { font-size: 18px; font-weight: 700; color: #FFF; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
        
        .form-group { margin-bottom: 16px; position: relative;}
        .form-group label { display: block; font-size: 13px; color: var(--text-muted); font-weight: 600; margin-bottom: 8px; }
        .form-control { width: 100%; background: #0B0E17; border: 1px solid var(--border-color); color: #FFF; padding: 12px 16px; border-radius: 10px; font-size: 14px; outline: none; transition: 0.2s; }
        .form-control:focus { border-color: var(--purple-btn); }
        
        /* AI Button */
        .btn-ai { position: absolute; right: 8px; top: 32px; background: linear-gradient(135deg, #A855F7, #7C3AED); color: #FFF; border: none; padding: 6px 12px; border-radius: 6px; font-size: 11px; font-weight: 700; cursor: pointer; box-shadow: 0 0 10px rgba(168, 85, 247, 0.4); transition: 0.2s;}
        .btn-ai:active { transform: scale(0.9); }

        /* Type Selector */
        .type-selector { display: flex; gap: 10px; margin-bottom: 20px; }
        .type-opt { flex: 1; padding: 12px; background: #0B0E17; border: 1px solid var(--border-color); border-radius: 10px; text-align: center; cursor: pointer; font-size: 14px; font-weight: 700; color: var(--text-muted); transition: 0.3s; }
        .type-opt.active { background: rgba(16, 185, 129, 0.1); border-color: var(--success); color: var(--success); }
        .type-opt.active.premium { background: rgba(245, 158, 11, 0.1); border-color: var(--warning); color: var(--warning); }

        /* Image Preview */
        .img-preview-box { width: 100%; height: 160px; background: #0B0E17; border: 2px dashed var(--border-color); border-radius: 10px; display: flex; justify-content: center; align-items: center; margin-bottom: 10px; overflow: hidden; position: relative; }
        .img-preview-box img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .img-preview-text { color: var(--text-muted); font-size: 13px; position: absolute; pointer-events: none; }

        /* Sections */
        #taskBuilderSection, #premiumSection { transition: 0.3s; }
        .premium-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        /* Task Builder */
        .task-builder { border: 1px solid var(--border-color); border-radius: 12px; padding: 16px; background: rgba(0,0,0,0.2); margin-bottom: 20px; }
        .task-controls { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
        .btn-small { padding: 8px 12px; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; border: none; color: #FFF; transition: 0.2s; }
        .btn-small:active { transform: scale(0.95); }
        .btn-ad { background: #0EA5E9; } .btn-tg { background: #2AABEE; } .btn-link { background: #A855F7; }
        
        .task-list { display: flex; flex-direction: column; gap: 12px; }
        .task-row { display: flex; gap: 10px; align-items: center; background: #0B0E17; padding: 10px; border-radius: 10px; border: 1px solid var(--border-color); }
        .task-row input { flex: 1; background: transparent; border: 1px solid var(--border-color); color: #FFF; padding: 8px; border-radius: 6px; font-size: 13px; outline: none;}
        .task-badge { padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: 700; text-transform: uppercase; }
        .btn-remove { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.3); padding: 8px 12px; border-radius: 8px; cursor: pointer; }

        .btn-submit { width: 100%; padding: 16px; border-radius: 12px; font-size: 15px; font-weight: 800; background: var(--success); color: #FFF; border: none; cursor: pointer; transition: 0.2s; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .btn-submit:disabled { opacity: 0.7; cursor: not-allowed; }
        
        .btn-cancel { width: 100%; padding: 12px; border-radius: 12px; font-size: 14px; font-weight: 700; background: rgba(255, 255, 255, 0.05); color: var(--text-muted); border: 1px solid var(--border-color); cursor: pointer; transition: 0.2s; display: none; justify-content: center; align-items: center; gap: 8px; margin-top: 10px; }
        .btn-cancel:hover { background: rgba(255, 255, 255, 0.1); color: #FFF; }

        /* Video List */
        .video-list { display: flex; flex-direction: column; gap: 12px; }
        .video-item { display: flex; justify-content: space-between; align-items: center; background: #0B0E17; padding: 12px; border-radius: 12px; border: 1px solid var(--border-color); position: relative; overflow: hidden;}
        .vi-left { display: flex; align-items: center; gap: 12px; z-index: 2;}
        .vi-thumb { width: 65px; height: 45px; border-radius: 8px; object-fit: cover; }
        .vi-title { font-size: 14px; font-weight: 700; color: #FFF; }
        .vi-tasks { font-size: 11px; color: var(--text-muted); margin-top: 4px; display: flex; gap: 6px; align-items: center;}
        
        .badge-mini-prem { background: rgba(245, 158, 11, 0.2); color: var(--warning); padding: 2px 6px; border-radius: 4px; font-size: 9px; font-weight: 800;}
        .badge-mini-free { background: rgba(16, 185, 129, 0.2); color: var(--success); padding: 2px 6px; border-radius: 4px; font-size: 9px; font-weight: 800;}
    </style>
</head>
<body>

    <div class="header">
        <h1><i class="fa-solid fa-microchip"></i> Super Admin Panel</h1>
        <div style="font-size: 13px; color: var(--success); font-weight: 600;"><i class="fa-solid fa-signal"></i> System Online</div>
    </div>

    <div class="container">
        <div class="card">
            <div class="card-title" id="formActionTitle"><i class="fa-solid fa-wand-magic-sparkles"></i> Create Content</div>
            
            <div class="type-selector">
                <div class="type-opt active" id="optFree" onclick="toggleType('free')"><i class="fa-solid fa-gift"></i> Free (Tasks)</div>
                <div class="type-opt premium" id="optPremium" onclick="toggleType('premium')"><i class="fa-solid fa-crown"></i> VIP (Paid)</div>
            </div>

            <div class="form-group">
                <label>Video Title</label>
                <input type="text" id="vidTitle" class="form-control" placeholder="Enter video title...">
                <button class="btn-ai" onclick="generateAITitle()"><i class="fa-solid fa-brain"></i> AI Suggest</button>
            </div>

            <div class="form-group">
                <label>Thumbnail Image (Auto Upload to Link)</label>
                <div class="img-preview-box">
                    <div class="img-preview-text" id="previewText"><i class="fa-solid fa-cloud-arrow-up"></i> Tap to upload image</div>
                    <img id="thumbPreview" src="">
                    <input type="file" id="thumbFile" accept="image/*" style="opacity: 0; position: absolute; inset: 0; cursor: pointer;" onchange="previewImage(event)">
                </div>
            </div>

            <div class="form-group">
                <label>Main Video Download / Direct Link</label>
                <input type="text" id="vidDownloadLink" class="form-control" placeholder="https://...">
            </div>

            <div id="premiumSection" style="display: none;">
                <div class="premium-inputs">
                    <div class="form-group">
                        <label>Price (Telegram Stars)</label>
                        <input type="number" id="priceStars" class="form-control" placeholder="e.g. 50">
                    </div>
                    <div class="form-group">
                        <label>Price (USDT)</label>
                        <input type="number" id="priceUsdt" step="0.01" class="form-control" placeholder="e.g. 1.50">
                    </div>
                </div>
            </div>

            <div id="taskBuilderSection" class="task-builder">
                <label style="display: block; font-size: 13px; color: var(--text-muted); font-weight: 600; margin-bottom: 12px;">Tasks Configuration (Serial)</label>
                <div class="task-controls">
                    <button class="btn-small btn-ad" onclick="addTaskRow('ad')"><i class="fa-solid fa-play"></i> Add Ad Task</button>
                    <button class="btn-small btn-tg" onclick="addTaskRow('telegram')"><i class="fa-brands fa-telegram"></i> Add Telegram</button>
                    <button class="btn-small btn-link" onclick="addTaskRow('link')"><i class="fa-solid fa-link"></i> Add Link</button>
                </div>
                <div class="task-list" id="taskRowsContainer">
                    </div>
            </div>

            <button class="btn-submit" id="btnSave" onclick="saveVideoData()"><i class="fa-solid fa-bolt"></i> Publish Content</button>
            <button class="btn-cancel" id="btnCancelEdit" onclick="cancelEdit()"><i class="fa-solid fa-xmark"></i> Cancel Edit</button>
        </div>

        <div class="card">
            <div class="card-title"><i class="fa-solid fa-server"></i> Database Content</div>
            <div class="video-list" id="manageVideoList">
                <div style="text-align: center; color: var(--text-muted); padding: 20px;">Loading database...</div>
            </div>
        </div>
    </div>

    <script>
        // --- Firebase Config ---
        const firebaseConfig = {
            apiKey: "AIzaSyDodc2AO3AXP23dU76tJA_balNaylwoSBc",
            authDomain: "video-3dadf.firebaseapp.com",
            projectId: "video-3dadf",
            storageBucket: "video-3dadf.firebasestorage.app",
            messagingSenderId: "726233412443",
            appId: "1:726233412443:web:4b5674128b7baa15f9e07e"
        };
        
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // ImgBB API Key
        const IMGBB_API_KEY = "15a100357dd1540e4bb3bc03b7ec06d7";
        let taskCounter = 0;
        let currentType = 'free'; // 'free' or 'premium'
        let allExistingTitles = []; // For AI Learning
        let loadedVideos = {}; // local cache of firebase data
        let editingVideoId = null; // tracking edit state
        let currentThumbUrl = ""; // stored URL when editing

        document.addEventListener('DOMContentLoaded', loadVideos);

        // --- Toggle Type (Free / Premium) ---
        function toggleType(type) {
            currentType = type;
            if(type === 'free') {
                document.getElementById('optFree').classList.add('active');
                document.getElementById('optPremium').classList.remove('active');
                document.getElementById('taskBuilderSection').style.display = 'block';
                document.getElementById('premiumSection').style.display = 'none';
            } else {
                document.getElementById('optPremium').classList.add('active');
                document.getElementById('optFree').classList.remove('active');
                document.getElementById('taskBuilderSection').style.display = 'none';
                document.getElementById('premiumSection').style.display = 'block';
            }
        }

        // --- Super AI Title Generator Algorithm ---
        function generateAITitle() {
            const btn = document.querySelector('.btn-ai');
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Thinking...`;
            
            setTimeout(() => {
                let prefix = ["Exclusive", "Viral", "Trending", "Premium", "Hot", "Leaked", "Secret", "Must Watch"];
                let suffix = ["Video", "Content", "Clip", "Footage", "Collection"];
                let learnedWords = [];

                if(allExistingTitles.length > 0) {
                    allExistingTitles.forEach(t => {
                        let words = t.split(' ').filter(w => w.length > 3 && !prefix.includes(w) && !suffix.includes(w));
                        learnedWords.push(...words);
                    });
                }
                
                learnedWords = [...new Set(learnedWords)];
                
                let randomPrefix = prefix[Math.floor(Math.random() * prefix.length)];
                let randomSuffix = suffix[Math.floor(Math.random() * suffix.length)];
                
                let finalTitle = "";
                if(learnedWords.length > 2) {
                    let randomLearned = learnedWords[Math.floor(Math.random() * learnedWords.length)];
                    let formats = [
                        `${randomPrefix} ${randomLearned} ${randomSuffix}`,
                        `${randomPrefix}: ${randomLearned} Unlocked`,
                        `New ${randomLearned} - ${randomPrefix} ${randomSuffix}`
                    ];
                    finalTitle = formats[Math.floor(Math.random() * formats.length)];
                } else {
                    finalTitle = `${randomPrefix} Masterclass ${randomSuffix} 2026`;
                }

                document.getElementById('vidTitle').value = finalTitle;
                btn.innerHTML = `<i class="fa-solid fa-brain"></i> AI Suggest`;
            }, 600);
        }

        // --- Image Preview Logic ---
        function previewImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('thumbPreview').src = e.target.result;
                    document.getElementById('thumbPreview').style.display = 'block';
                    document.getElementById('previewText').style.display = 'none';
                }
                reader.readAsDataURL(file);
            }
        }

        // --- Zone ID Memory (Auto-fill) ---
        function saveZoneId(val) {
            if(val) localStorage.setItem('wd_last_zone_id', val);
        }

        // --- Task Builder Logic ---
        function addTaskRow(type) {
            taskCounter++;
            const container = document.getElementById('taskRowsContainer');
            const row = document.createElement('div');
            row.className = 'task-row';
            row.id = `task-row-${taskCounter}`;

            let badgeHtml = '';
            let inputHtml = '';

            if (type === 'ad') {
                badgeHtml = `<span class="task-badge" style="background: rgba(14, 165, 233, 0.2); color: #0EA5E9;">AD</span>`;
                let savedZone = localStorage.getItem('wd_last_zone_id') || '';
                
                inputHtml = `
                    <input type="text" class="task-title" placeholder="Task Title" value="Watch Ad to Unlock" required>
                    <input type="text" class="task-data" placeholder="Monetag Zone ID" value="${savedZone}" oninput="saveZoneId(this.value)" required>
                `;
            } else if (type === 'telegram') {
                badgeHtml = `<span class="task-badge" style="background: rgba(42, 171, 238, 0.2); color: #2AABEE;">TG</span>`;
                inputHtml = `
                    <input type="text" class="task-title" placeholder="Task Title" value="Join Telegram Channel" required>
                    <input type="text" class="task-data" placeholder="Channel Link (t.me/...)" required>
                `;
            } else {
                badgeHtml = `<span class="task-badge" style="background: rgba(168, 85, 247, 0.2); color: #A855F7;">LINK</span>`;
                inputHtml = `
                    <input type="text" class="task-title" placeholder="Task Title" value="Visit Sponsor Link" required>
                    <input type="text" class="task-data" placeholder="URL (https://...)" required>
                `;
            }

            row.innerHTML = `
                ${badgeHtml}
                <input type="hidden" class="task-type" value="${type}">
                ${inputHtml}
                <button class="btn-remove" onclick="document.getElementById('task-row-${taskCounter}').remove()"><i class="fa-solid fa-trash"></i></button>
            `;
            container.appendChild(row);
        }

        // --- Task Builder Helper for Populating Existing Tasks ---
        function addTaskRowWithData(task) {
            taskCounter++;
            const container = document.getElementById('taskRowsContainer');
            const row = document.createElement('div');
            row.className = 'task-row';
            row.id = `task-row-${taskCounter}`;

            let badgeHtml = '';
            let inputHtml = '';

            if (task.type === 'ad') {
                badgeHtml = `<span class="task-badge" style="background: rgba(14, 165, 233, 0.2); color: #0EA5E9;">AD</span>`;
                inputHtml = `
                    <input type="text" class="task-title" placeholder="Task Title" value="${task.title}" required>
                    <input type="text" class="task-data" placeholder="Monetag Zone ID" value="${task.zone_id || ''}" required>
                `;
            } else if (task.type === 'telegram') {
                badgeHtml = `<span class="task-badge" style="background: rgba(42, 171, 238, 0.2); color: #2AABEE;">TG</span>`;
                inputHtml = `
                    <input type="text" class="task-title" placeholder="Task Title" value="${task.title}" required>
                    <input type="text" class="task-data" placeholder="Channel Link" value="${task.link || ''}" required>
                `;
            } else {
                badgeHtml = `<span class="task-badge" style="background: rgba(168, 85, 247, 0.2); color: #A855F7;">LINK</span>`;
                inputHtml = `
                    <input type="text" class="task-title" placeholder="Task Title" value="${task.title}" required>
                    <input type="text" class="task-data" placeholder="URL (https://...)" value="${task.link || ''}" required>
                `;
            }

            row.innerHTML = `
                ${badgeHtml}
                <input type="hidden" class="task-type" value="${task.type}">
                ${inputHtml}
                <button class="btn-remove" onclick="document.getElementById('task-row-${taskCounter}').remove()"><i class="fa-solid fa-trash"></i></button>
            `;
            container.appendChild(row);
        }

        // --- Upload Image to ImgBB ---
        async function uploadThumbnail(file) {
            const formData = new FormData();
            formData.append('image', file);

            const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                method: 'POST',
                body: formData
            });
            const data = await response.json();
            if (data.success) return data.data.url;
            else throw new Error("Image upload failed!");
        }

        // --- Set Form to Edit Mode ---
        function editVideo(id) {
            const video = loadedVideos[id];
            if (!video) return;

            editingVideoId = id;
            currentThumbUrl = video.thumb_url;

            // Change Layout Status
            document.getElementById('formActionTitle').innerHTML = `<i class="fa-solid fa-pen-to-square"></i> Edit Content`;
            document.getElementById('btnSave').innerHTML = `<i class="fa-solid fa-save"></i> Update Content`;
            document.getElementById('btnCancelEdit').style.display = 'inline-flex';

            // Populate Form values
            document.getElementById('vidTitle').value = video.title;
            document.getElementById('vidDownloadLink').value = video.download_link;

            // Render Preview
            document.getElementById('thumbPreview').src = video.thumb_url;
            document.getElementById('thumbPreview').style.display = 'block';
            document.getElementById('previewText').style.display = 'none';
            document.getElementById('thumbFile').value = ''; // Reset file input

            toggleType(video.type);

            if (video.type === 'free') {
                document.getElementById('taskRowsContainer').innerHTML = '';
                if (video.tasks && video.tasks.length > 0) {
                    video.tasks.forEach(task => {
                        addTaskRowWithData(task);
                    });
                }
            } else {
                document.getElementById('priceStars').value = video.price_stars || '';
                document.getElementById('priceUsdt').value = video.price_usdt || '';
            }

            // Scroll to Top smoothly
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // --- Cancel Edit Mode ---
        function cancelEdit() {
            editingVideoId = null;
            currentThumbUrl = "";

            document.getElementById('formActionTitle').innerHTML = `<i class="fa-solid fa-wand-magic-sparkles"></i> Create Content`;
            document.getElementById('btnSave').innerHTML = `<i class="fa-solid fa-bolt"></i> Publish Content`;
            document.getElementById('btnCancelEdit').style.display = 'none';

            // Clear Form data
            document.getElementById('vidTitle').value = '';
            document.getElementById('vidDownloadLink').value = '';
            document.getElementById('thumbFile').value = '';
            document.getElementById('thumbPreview').style.display = 'none';
            document.getElementById('previewText').style.display = 'block';
            document.getElementById('taskRowsContainer').innerHTML = '';
            document.getElementById('priceStars').value = '';
            document.getElementById('priceUsdt').value = '';
            toggleType('free');
        }

        // --- Save / Update Data on Firebase ---
        async function saveVideoData() {
            const title = document.getElementById('vidTitle').value.trim();
            const downloadLink = document.getElementById('vidDownloadLink').value.trim();
            const fileInput = document.getElementById('thumbFile');
            const btn = document.getElementById('btnSave');

            if (!title || !downloadLink) { alert("Please fill in Video Title and Download Link!"); return; }
            if (!editingVideoId && fileInput.files.length === 0) { alert("Please select a thumbnail image!"); return; }

            let dataToSave = {
                title: title,
                type: currentType,
                download_link: downloadLink
            };

            // Set timestamps only during creation
            if (!editingVideoId) {
                dataToSave.createdAt = firebase.firestore.FieldValue.serverTimestamp();
            }

            // Populate according to type
            if (currentType === 'free') {
                let tasksArray = [];
                const taskRows = document.querySelectorAll('.task-row');
                
                for (let i = 0; i < taskRows.length; i++) {
                    const type = taskRows[i].querySelector('.task-type').value;
                    const taskTitle = taskRows[i].querySelector('.task-title').value.trim();
                    const taskData = taskRows[i].querySelector('.task-data').value.trim();

                    if (!taskTitle || !taskData) { alert("Please fill all task fields correctly!"); return; }

                    let taskObj = { id: 't' + Math.random().toString(36).substr(2, 6), type: type, title: taskTitle };
                    if (type === 'ad') taskObj.zone_id = taskData; else taskObj.link = taskData;
                    tasksArray.push(taskObj);
                }
                dataToSave.tasks = tasksArray;
                
                // Clear old premium keys in firebase if we changed type
                dataToSave.price_stars = firebase.firestore.FieldValue.delete();
                dataToSave.price_usdt = firebase.firestore.FieldValue.delete();
            } else {
                let pStars = document.getElementById('priceStars').value || 50;
                let pUsdt = document.getElementById('priceUsdt').value || 1.0;
                dataToSave.price_stars = parseInt(pStars);
                dataToSave.price_usdt = parseFloat(pUsdt);
                
                // Clear tasks key if we changed type
                dataToSave.tasks = firebase.firestore.FieldValue.delete();
            }

            btn.disabled = true;

            try {
                // If a new thumbnail file was chosen
                let finalThumbUrl = currentThumbUrl;
                if (fileInput.files.length > 0) {
                    btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Uploading Image...`;
                    finalThumbUrl = await uploadThumbnail(fileInput.files[0]);
                }
                dataToSave.thumb_url = finalThumbUrl;

                btn.innerHTML = `<i class="fa-solid fa-database"></i> Saving...`;

                if (editingVideoId) {
                    await db.collection('unlockable_videos').doc(editingVideoId).update(dataToSave);
                    alert("Content Updated Successfully!");
                } else {
                    await db.collection('unlockable_videos').add(dataToSave);
                    alert("Content Published Successfully!");
                }
                
                cancelEdit(); // Reset form/state
                
            } catch (error) {
                console.error(error);
                alert("Error: " + error.message);
            } finally {
                btn.disabled = false;
                if (editingVideoId) {
                    btn.innerHTML = `<i class="fa-solid fa-save"></i> Update Content`;
                } else {
                    btn.innerHTML = `<i class="fa-solid fa-bolt"></i> Publish Content`;
                }
            }
        }

        // --- Load Existing Videos ---
        function loadVideos() {
            db.collection('unlockable_videos').orderBy('createdAt', 'desc').onSnapshot(snap => {
                const list = document.getElementById('manageVideoList');
                list.innerHTML = '';
                allExistingTitles = [];
                loadedVideos = {};

                if (snap.empty) {
                    list.innerHTML = '<div style="text-align: center; color: var(--text-muted); padding: 20px;">No content found.</div>';
                    return;
                }

                snap.forEach(doc => {
                    const data = doc.data();
                    loadedVideos[doc.id] = data; // store locally
                    allExistingTitles.push(data.title);
                    
                    let isPremium = data.type === 'premium';
                    let badge = isPremium ? '<span class="badge-mini-prem">VIP</span>' : '<span class="badge-mini-free">FREE</span>';
                    let infoText = isPremium ? `<i class="fa-solid fa-star" style="color:var(--star-gold)"></i> ${data.price_stars}` : `${data.tasks ? data.tasks.length : 0} Tasks`;

                    list.innerHTML += `
                        <div class="video-item">
                            <div class="vi-left">
                                <img src="${data.thumb_url}" class="vi-thumb">
                                <div>
                                    <div class="vi-title">${data.title} ${badge}</div>
                                    <div class="vi-tasks">${infoText}</div>
                                </div>
                            </div>
                            <div style="display: flex; gap: 8px; z-index: 2;">
                                <button onclick="editVideo('${doc.id}')" style="background: rgba(14, 165, 233, 0.1); color: #0EA5E9; border: 1px solid rgba(14, 165, 233, 0.3); padding: 10px 14px; border-radius: 10px; cursor: pointer;"><i class="fa-solid fa-pen"></i></button>
                                <button class="btn-del" onclick="deleteVideo('${doc.id}')" style="background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.3); padding: 10px 14px; border-radius: 10px; cursor: pointer;"><i class="fa-solid fa-trash-can"></i></button>
                            </div>
                        </div>
                    `;
                });
            });
        }

        // --- Delete Video ---
        function deleteVideo(id) {
            if(confirm("Are you sure you want to delete this content?")) {
                if(editingVideoId === id) {
                    cancelEdit();
                }
                db.collection('unlockable_videos').doc(id).delete()
                    .catch(e => alert("Error: " + e.message));
            }
        }
    </script>
</body>
</html>
